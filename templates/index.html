<!DOCTYPE html>
<html>
<head>
    <title>CREAC Legal AI</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        textarea { width: 100%; height: 150px; }
        button { padding: 10px 20px; margin-top: 10px; }
        #response { margin-top: 20px; white-space: pre-wrap; background: #f9f9f9; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
<h1>CREAC Legal AI</h1>
<textarea id="input">
TASK TYPE: Predictive Memo
JURISDICTION: Federal + Georgia
AREA OF LAW: Negligence
FACTS: A driver ran a red light and struck a pedestrian in a crosswalk.
LEGAL QUESTION: Is the driver liable for negligence?
OUTPUT LEVEL: Law Student
</textarea>
<br>
<button onclick="sendRequest()">Generate Memo</button>
<div id="response"></div>
<script>
async function sendRequest() {
    const input = document.getElementById("input").value;
    const responseDiv = document.getElementById("response");
    responseDiv.innerHTML = "Generating...";
    try {
        const res = await fetch("/generate", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({input})
        });
        const data = await res.json();
        responseDiv.innerText = data.response || data.error;
    } catch {
        responseDiv.innerText = "Error connecting to server.";
    }
}
</script>
</body>
</html>
